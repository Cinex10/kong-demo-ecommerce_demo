        "tags": [
          "Configuration"
        ],
        "summary": "Get configured workflows",
        "description": "Retrieves defined processing workflows (e.g., for order routing, returns processing).",
        "operationId": "getConfigWorkflows",
        "responses": {
          "200": {
            "description": "List of configured workflows.",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/Workflow"
                  }
                }
              }
            }
          },
          "500": {
            "$ref": "#/components/responses/InternalServerError"
          }
        },
        "x-kong-name": "get-configured-workflows"
      }
    },
    "/config/webhooks": {
      "get": {
        "tags": [
          "Configuration"
        ],
        "summary": "List registered webhooks",
        "description": "Retrieves a list of all currently registered webhook endpoints.",
        "operationId": "listWebhooks",
        "responses": {
          "200": {
            "description": "List of webhooks.",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/Webhook"
                  }
                }
              }
            }
          },
          "500": {
            "$ref": "#/components/responses/InternalServerError"
          }
        },
        "x-kong-name": "list-registered-webhooks"
      },
      "post": {
        "tags": [
          "Configuration"
        ],
        "summary": "Register webhook",
        "description": "Registers a new webhook endpoint to receive notifications for specified event types.",
        "operationId": "registerWebhook",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/WebhookCreateRequest"
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Webhook registered successfully.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Webhook"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "422": {
            "$ref": "#/components/responses/UnprocessableEntity",
            "description": "Unprocessable Entity - Invalid URL or event types."
          },
          "500": {
            "$ref": "#/components/responses/InternalServerError"
          }
        },
        "x-kong-name": "register-webhook"
      }
    },
    "/config/webhooks/{webhookId}": {
      "parameters": [
        {
          "$ref": "#/components/parameters/webhookId"
        }
      ],
      "get": {
        "tags": [
          "Configuration"
        ],
        "summary": "Get webhook details",
        "description": "Retrieves details for a specific registered webhook.",
        "operationId": "getWebhookById",
        "responses": {
          "200": {
            "description": "Webhook details.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Webhook"
                }
              }
            }
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "500": {
            "$ref": "#/components/responses/InternalServerError"
          }
        },
        "x-kong-name": "get-webhook-details"
      },
      "delete": {
        "tags": [
          "Configuration"
        ],
        "summary": "Delete webhook",
        "description": "Removes a registered webhook subscription.",
        "operationId": "deleteWebhook",
        "responses": {
          "204": {
            "description": "Webhook deleted successfully."
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "500": {
            "$ref": "#/components/responses/InternalServerError"
          }
        },
        "x-kong-name": "delete-webhook"
      }
    },
    "/health": {
      "get": {
        "tags": [
          "Configuration"
        ],
        "summary": "Service health check",
        "description": "Provides the operational status of the OMS service and its key dependencies.",
        "operationId": "getHealthCheck",
        "responses": {
          "200": {
            "description": "Service is operational.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HealthStatus"
                },
                "example": {
                  "status": "ok",
                  "timestamp": "2023-11-01T12:00:00Z",
                  "dependencies": {
                    "database": "ok",
                    "messageQueue": "ok",
                    "shippingCarrierAPI": "ok",
                    "paymentGatewayAPI": "ok"
                  }
                }
              }
            }
          },
          "503": {
            "description": "Service is unavailable or one or more dependencies are degraded/erroring.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HealthStatus"
                },
                "example": {
                  "status": "degraded",
                  "timestamp": "2023-11-01T12:05:00Z",
                  "dependencies": {
                    "database": "ok",
                    "messageQueue": "ok",
                    "shippingCarrierAPI": "error",
                    "paymentGatewayAPI": "ok"
                  }
                }
              }
            }
          }
        },
        "x-kong-name": "service-health-check"
      }
    }
  },
  "components": {
    "schemas": {
      "Money": {
        "type": "object",
        "description": "Represents a monetary value.",
        "properties": {
          "amount": {
            "type": "number",
            "format": "float",
            "description": "The numerical amount.",
            "example": 29.99
          },
          "currencyCode": {
            "type": "string",
            "description": "3-letter ISO 4217 currency code.",
            "example": "USD"
          }
        },
        "required": [
          "amount",
          "currencyCode"
        ]
      },
      "Address": {
        "type": "object",
        "description": "Represents a physical address.",
        "properties": {
          "id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for the saved address (if applicable).",
            "readOnly": true,
            "example": "addr_b1a2c3d4-e5f6-7890-1234-567890abcdef"
          },
          "firstName": {
            "type": "string",
            "example": "Jane"
          },
          "lastName": {
            "type": "string",
            "example": "Doe"
          },
          "company": {
            "type": "string",
            "example": "Acme Corp",
            "nullable": true
          },
          "street1": {
            "type": "string",
            "description": "Street address line 1.",
            "example": "123 Main St"
          },
          "street2": {
            "type": "string",
            "description": "Street address line 2 (e.g., Apt, Suite).",
            "example": "Suite 4B",
            "nullable": true
          },
          "city": {
            "type": "string",
            "example": "Anytown"
          },
          "stateCode": {
            "type": "string",
            "description": "State, province, or region code (ISO 3166-2 format where applicable).",
            "example": "CA"
          },
          "postalCode": {
            "type": "string",
            "example": "90210"
          },
          "countryCode": {
            "type": "string",
            "description": "2-letter ISO 3166-1 alpha-2 country code.",
            "example": "US"
          },
          "phone": {
            "type": "string",
            "example": "555-123-4567",
            "nullable": true
          },
          "addressType": {
            "type": "string",
            "enum": [
              "billing",
              "shipping"
            ],
            "description": "Indicates the purpose of the address in the context of the order.",
            "example": "shipping"
          }
        },
        "required": [
          "firstName",
          "lastName",
          "street1",
          "city",
          "postalCode",
          "countryCode"
        ]
      },
      "CustomerInfo": {
        "type": "object",
        "description": "Information identifying the customer placing the order.",
        "properties": {
          "customerId": {
            "type": "string",
            "description": "Unique identifier for the customer in the CRM or OMS.",
            "example": "cust_abc987",
            "nullable": true
          },
          "email": {
            "type": "string",
            "format": "email",
            "example": "john.doe@example.com"
          },
          "firstName": {
            "type": "string",
            "example": "John"
          },
          "lastName": {
            "type": "string",
            "example": "Doe"
          }
        },
        "required": [
          "email"
        ]
      },
      "OrderItem": {
        "type": "object",
        "description": "Represents a single line item within an order.",
        "properties": {
          "id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for this line item within the order.",
            "readOnly": true,
            "example": "item_1a2b3c4d-5e6f-7890-1234-567890abcdef"
          },
          "sku": {
            "type": "string",
            "description": "Stock Keeping Unit identifying the product variant.",
            "example": "TSHIRT-BLK-L"
          },
          "productId": {
            "type": "string",
            "description": "Identifier for the base product in the PIM/Catalog.",
            "example": "prod_12345",
            "nullable": true
          },
          "name": {
            "type": "string",
            "description": "Product name at the time of order.",
            "example": "Black T-Shirt - Large"
          },
          "quantity": {
            "type": "integer",
            "format": "int32",
            "description": "Quantity ordered.",
            "minimum": 1,
            "example": 2
          },
          "unitPrice": {
            "$ref": "#/components/schemas/Money",
            "description": "Price per single unit."
          },
          "lineTotal": {
            "$ref": "#/components/schemas/Money",
            "description": "Total price for this line item (unitPrice * quantity).",
            "readOnly": true
          },
          "taxAmount": {
            "$ref": "#/components/schemas/Money",
            "description": "Tax amount applied specifically to this line item.",
            "nullable": true,
            "readOnly": true
          },
          "discountAmount": {
            "$ref": "#/components/schemas/Money",
            "description": "Discount amount applied specifically to this line item.",
            "nullable": true,
            "readOnly": true
          },
          "fulfillmentStatus": {
            "type": "string",
            "enum": [
              "unfulfilled",
              "partially_fulfilled",
              "fulfilled"
            ],
            "description": "Fulfillment status of this specific line item.",
            "example": "unfulfilled",
            "readOnly": true
          },
          "quantityFulfilled": {
            "type": "integer",
            "format": "int32",
            "description": "Quantity of this item that has been fulfilled.",
            "example": 0,
            "readOnly": true
          }
        },
        "required": [
          "sku",
          "name",
          "quantity",
          "unitPrice"
        ]
      },
      "DiscountApplication": {
        "type": "object",
        "description": "Details of a discount applied to the order.",
        "properties": {
          "code": {
            "type": "string",
            "example": "FALLSALE20",
            "description": "The discount code used (if applicable)."
          },
          "description": {
            "type": "string",
            "example": "20% Off Fall Collection",
            "description": "Description of the discount."
          },
          "amount": {
            "$ref": "#/components/schemas/Money",
            "description": "The amount of the discount applied."
          },
          "type": {
            "type": "string",
            "enum": [
              "percentage",
              "fixed_amount",
              "shipping"
            ],
            "example": "percentage"
          },
          "target": {
            "type": "string",
            "enum": [
              "order",
              "item"
            ],
            "description": "Whether the discount applies to the whole order or specific items.",
            "example": "order"
          }
        },
        "required": [
          "description",
          "amount",
          "type",
          "target"
        ]
      },
      "TaxLine": {
        "type": "object",
        "description": "Details of a specific tax applied to the order.",
        "properties": {
          "description": {
            "type": "string",
            "example": "CA State Tax"
          },
          "rate": {
            "type": "number",
            "format": "float",
            "example": 0.0825
          },
          "amount": {
            "$ref": "#/components/schemas/Money"
          }
        },
        "required": [
          "description",
          "rate",
          "amount"
        ]
      },
      "Order": {
        "type": "object",
        "description": "Represents a customer order.",
        "properties": {
          "id": {
            "type": "string",
            "format": "uuid",
            "description": "Unique identifier for the order.",
            "readOnly": true,
            "example": "ord_d5f9e3c1-8a7b-4d2e-9f1c-0a9b8d7e6f5a"
          },
          "orderNumber": {
            "type": "string",
            "description": "Human-readable order number, often prefixed by channel.",
            "example": "WEB-1001"
          },
          "channel": {
            "type": "string",
            "description": "The sales channel where the order originated.",
            "example": "Website"
          },
          "status": {
            "type": "string",
            "description": "The current primary status of the order.",
            "example": "processing"
          },
          "statusHistory": {
            "type": "array",
            "description": "Chronological list of status changes and events.",
            "items": {
              "$ref": "#/components/schemas/OrderStatusHistoryEvent"
            },
            "readOnly": true
          },
          "createdAt": {
            "type": "string",
            "format": "date-time",
            "description": "Timestamp when the order was created.",
            "readOnly": true,
            "example": "2023-11-01T10:30:00Z"
          },
          "updatedAt": {
            "type": "string",
            "format": "date-time",
            "description": "Timestamp when the order was last updated.",
            "readOnly": true,
            "example": "2023-11-01T11:05:15Z"
          },
          "customerInfo": {
            "$ref": "#/components/schemas/CustomerInfo"
          },
          "billingAddress": {
            "$ref": "#/components/schemas/Address"
          },
          "shippingAddress": {
            "$ref": "#/components/schemas/Address"
          },
          "items": {
            "type": "array",
            "description": "List of line items in the order.",
            "items": {
              "$ref": "#/components/schemas/OrderItem"
            }
          },
          "subtotal": {
            "$ref": "#/components/schemas/Money",
            "description": "Total price of all items before shipping, taxes, and discounts.",
            "readOnly": true
          },
          "shippingTotal": {
            "$ref": "#/components/schemas/Money",
            "description": "Total cost of shipping."
          },
          "taxTotal": {
            "$ref": "#/components/schemas/Money",
            "description": "Total amount of tax applied to the order."
          },
          "discountTotal": {
            "$ref": "#/components/schemas/Money",
            "description": "Total amount of discounts applied to the order."
          },
          "grandTotal": {
            "$ref": "#/components/schemas/Money",
            "description": "The final amount charged to the customer (subtotal + shipping + tax - discount).",
            "readOnly": true
          },
          "appliedDiscounts": {
            "type": "array",
            "description": "List of discounts applied to the order.",
            "items": {
              "$ref": "#/components/schemas/DiscountApplication"
            },
            "nullable": true
          },
          "taxLines": {
            "type": "array",
            "description": "Breakdown of taxes applied.",
            "items": {
              "$ref": "#/components/schemas/TaxLine"
            },
            "nullable": true
          },
          "paymentStatus": {
            "type": "string",
            "enum": [
              "pending",
              "paid",
              "refunded",
              "partially_refunded",
              "authorized",
              "failed",
              "voided"
            ],
            "description": "Overall payment status of the order.",
            "example": "paid"
          },
          "fulfillmentStatus": {
            "type": "string",
            "enum": [
              "unfulfilled",
              "partially_fulfilled",
              "fulfilled",
              "cancelled"
            ],
            "description": "Overall fulfillment status of the order.",
            "example": "unfulfilled"
          },
          "shippingMethod": {
            "type": "string",
            "description": "Identifier for the selected shipping method.",
            "example": "std-ground"
          },
          "shippingMethodName": {
            "type": "string",
            "description": "Display name of the selected shipping method.",
            "example": "Standard Ground"
          },
          "notes": {
            "type": "string",
            "description": "Customer notes or internal notes related to the order.",
            "nullable": true
          },
          "tags": {
            "type": "array",
            "description": "Tags associated with the order for categorization or filtering.",
            "items": {
              "type": "string"
            },
            "example": [
              "VIP",
              "Preorder",
              "Gift"
            ]
          },
          "_links": {
            "$ref": "#/components/schemas/Links"
          }
        },
        "required": [
          "id",
          "orderNumber",
          "channel",
          "status",
          "createdAt",
          "updatedAt",
          "customerInfo",
          "billingAddress",
          "shippingAddress",
          "items",
          "subtotal",
          "shippingTotal",
          "taxTotal",
          "discountTotal",
          "grandTotal",
          "paymentStatus",
          "fulfillmentStatus"
        ]
      },
      "OrderCreateRequest": {
        "description": "Data required to create a new order.",
        "type": "object",
        "properties": {
          "orderNumber": {
            "type": "string",
            "description": "Optional: Provide an order number from the source system. If omitted, OMS may generate one.",
            "example": "WEB-1002",
            "nullable": true
          },
          "channel": {
            "type": "string",
            "example": "Website"
          },
          "customerInfo": {
            "$ref": "#/components/schemas/CustomerInfo"
          },
          "billingAddress": {
            "$ref": "#/components/schemas/Address"
          },
          "shippingAddress": {
            "$ref": "#/components/schemas/Address"
          },
          "items": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/OrderItemInput"
            },
            "minItems": 1
          },
          "shippingMethod": {
            "type": "string",
            "example": "std-ground"
          },
          "shippingMethodName": {
            "type": "string",
            "example": "Standard Ground"
          },
          "shippingTotal": {
            "$ref": "#/components/schemas/Money"
          },
          "taxTotal": {
            "$ref": "#/components/schemas/Money"
          },
          "discountTotal": {
            "$ref": "#/components/schemas/Money",
            "default": {
              "amount": 0,
              "currencyCode": "USD"
            }
          },
          "appliedDiscounts": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/DiscountApplication"
            },
            "nullable": true
          },
          "taxLines": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/TaxLine"
            },
            "nullable": true
          },
          "paymentStatus": {
            "type": "string",
            "enum": [
              "pending",
              "paid",
              "authorized"
            ],
            "description": "Initial payment status.",
            "example": "pending",
            "default": "pending"
          },
          "fulfillmentStatus": {
            "type": "string",
            "enum": [
              "unfulfilled"
            ],
            "description": "Initial fulfillment status.",
            "default": "unfulfilled"
          },
          "notes": {
            "type": "string",
            "nullable": true
          },
          "tags": {
            "type": "array",
            "items": {
              "type": "string"
            },
            "nullable": true
          }
        },
        "required": [
          "channel",
          "customerInfo",
          "billingAddress",
          "shippingAddress",
          "items",
          "shippingTotal",
          "taxTotal"
        ]
      },
      "OrderItemInput": {
        "description": "Input for defining an order item during creation.",
        "type": "object",
        "properties": {
          "sku": {
            "type": "string",
            "example": "MUG-LOGO-WHT"
          },
          "productId": {
            "type": "string",
            "example": "prod_67890",
            "nullable": true
          },
          "name": {
            "type": "string",
            "example": "Company Logo Mug - White",
            "nullable": true
          },
          "quantity": {
            "type": "integer",
            "format": "int32",
            "minimum": 1,
            "example": 1
          },
          "unitPrice": {
            "$ref": "#/components/schemas/Money"
          }
        },
        "required": [
          "sku",
          "quantity",
          "unitPrice"
        ]
      },
      "OrderPatchRequest": {
        "description": "Data for partially updating an order. Only include fields to be changed.",
        "type": "object",
        "properties": {
          "billingAddress": {
            "$ref": "#/components/schemas/Address"
          },
          "shippingAddress": {
            "$ref": "#/components/schemas/Address"
          },
          "shippingMethod": {
            "type": "string"
          },
          "shippingMethodName": {
            "type": "string"
          },
          "notes": {
            "type": "string",
            "nullable": true
          },
          "tags": {
            "type": "array",
            "items": {
              "type": "string"
            }
          }
        },
        "minProperties": 1
      },
      "UpdateOrderStatusRequest": {
        "type": "object",
        "properties": {
          "status": {
            "type": "string",
            "description": "The target status code for the order.",
            "example": "shipped"
          },
          "notes": {
            "type": "string",
            "description": "Optional notes accompanying the status change.",
            "nullable": true,
            "example": "Order fully shipped."
          }
        },
        "required": [
          "status"
        ]
      },
      "OrderStatusHistoryEvent": {
        "type": "object",
        "description": "An event in the order's status timeline.",
        "properties": {
          "timestamp": {
            "type": "string",
            "format": "date-time",
            "example": "2023-11-01T10:35:00Z"
          },
          "status": {
            "type": "string",
            "description": "The status the order transitioned to.",
            "example": "processing"
          },
          "notes": {
            "type": "string",
            "nullable": true,
            "example": "Payment successful via Stripe."
          },
          "triggeredBy": {
            "type": "string",
            "description": "Indicates what triggered the event (e.g., 'system', 'user:admin', 'payment_gateway').",
            "example": "payment_gateway"
          }
        },
        "required": [
          "timestamp",
          "status"
        ]
      },
      "CancelOrderRequest": {
        "type": "object",
        "properties": {
          "reasonCode": {
            "type": "string",
            "description": "A code indicating the reason for cancellation.",
            "example": "CUSTOMER_REQUEST"
          },
          "reasonNotes": {
            "type": "string",
            "description": "Additional details about the cancellation reason.",
            "example": "Customer changed their mind."
          },
          "restockItems": {
            "type": "boolean",
            "description": "If true, attempt to restock cancelled items back into inventory.",
            "default": true
          },
          "voidPayment": {
            "type": "boolean",
            "description": "If true, attempt to void any authorized but uncaptured payments.",
            "default": true
          }
        },
        "required": [
          "reasonCode"
        ]
      },
      "HoldOrderRequest": {
        "type": "object",
        "properties": {
          "reasonCode": {
            "type": "string",
            "description": "A code indicating the reason for the hold.",
            "example": "FRAUD_REVIEW"
          },
          "reasonNotes": {
            "type": "string",
            "description": "Additional details about the hold.",
            "example": "High risk score from payment gateway."
          }
        },
        "required": [
          "reasonCode"
        ]
      },
      "ReleaseOrderRequest": {
        "type": "object",
        "properties": {
          "notes": {
            "type": "string",
            "description": "Optional notes regarding the release action.",
            "nullable": true,
            "example": "Manual review completed, cleared for fulfillment."
          }
        }
      },
      "AddItemToOrderRequest": {
        "$ref": "#/components/schemas/OrderItemInput"
      },
      "UpdateItemInOrderRequest": {
        "description": "Data for updating an existing order item.",
        "type": "object",
        "properties": {
          "quantity": {
            "type": "integer",
            "format": "int32",
            "minimum": 1,
            "example": 1
