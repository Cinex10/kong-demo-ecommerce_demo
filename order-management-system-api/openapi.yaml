{
  "openapi": "3.0.3",
  "info": {
    "title": "Order Management System API",
    "description": "Comprehensive API specification for a realistic Order Management System (OMS) designed for e-commerce operations. Covers order lifecycle management, fulfillment processing, shipping coordination, returns and refunds, inventory synchronization, customer data linkage, payment handling, reporting, and system configuration.",
    "version": "1.1.0",
    "contact": {
      "name": "ExampleOMS API Team",
      "url": "https://developer.exampleoms.com",
      "email": "api-support@exampleoms.com"
    }
  },
  "servers": [
    {
      "url": "http://kong-demo-lb-285734184.eu-west-3.elb.amazonaws.com",
      "description": "Ecommerce API Gateway"
    }
  ],
  "tags": [
    {
      "name": "Orders",
      "description": "Core operations for creating, retrieving, updating, and managing customer orders."
    },
    {
      "name": "Order Items",
      "description": "Managing line items within orders."
    },
    {
      "name": "Fulfillments",
      "description": "Managing the process of fulfilling order items, including picking, packing, and shipment creation."
    },
    {
      "name": "Shipping",
      "description": "Operations related to shipping methods, carriers, rate calculation, and label generation."
    },
    {
      "name": "Returns (RMAs)",
      "description": "Managing customer return requests (Return Merchandise Authorizations)."
    },
    {
      "name": "Refunds",
      "description": "Processing refunds related to orders or returns."
    },
    {
      "name": "Inventory",
      "description": "Operations for querying and adjusting inventory levels across locations."
    },
    {
      "name": "Locations",
      "description": "Managing fulfillment locations (warehouses, stores)."
    },
    {
      "name": "Customers",
      "description": "Retrieving customer-related order information."
    },
    {
      "name": "Payments",
      "description": "Operations for processing and managing order payments."
    },
    {
      "name": "Reports",
      "description": "Endpoints for generating various operational reports."
    },
    {
      "name": "Configuration",
      "description": "Managing system settings, webhooks, and health checks."
    }
  ],
  "paths": {
    "/orders": {
      "get": {
        "tags": [
          "Orders"
        ],
        "summary": "List orders",
        "description": "Retrieves a paginated list of orders, supporting various filtering and sorting options.",
        "operationId": "listOrders",
        "parameters": [
          {
            "$ref": "#/components/parameters/limitParam"
          },
          {
            "$ref": "#/components/parameters/pageParam"
          },
          {
            "$ref": "#/components/parameters/filterStatus"
          },
          {
            "$ref": "#/components/parameters/filterDateFrom"
          },
          {
            "$ref": "#/components/parameters/filterDateTo"
          },
          {
            "$ref": "#/components/parameters/filterChannel"
          },
          {
            "$ref": "#/components/parameters/filterCustomerId"
          },
          {
            "name": "fulfillmentStatus",
            "in": "query",
            "description": "Filter by fulfillment status.",
            "schema": {
              "type": "string",
              "enum": [
                "unfulfilled",
                "partially_fulfilled",
                "fulfilled",
                "cancelled"
              ]
            }
          },
          {
            "name": "paymentStatus",
            "in": "query",
            "description": "Filter by payment status.",
            "schema": {
              "type": "string",
              "enum": [
                "pending",
                "paid",
                "refunded",
                "partially_refunded",
                "authorized",
                "failed"
              ]
            }
          },
          {
            "name": "sort",
            "in": "query",
            "description": "Sort results by field (prefix with '-' for descending). Examples: `createdAt`, `-grandTotal.amount`, `orderNumber`",
            "schema": {
              "type": "string",
              "example": "-createdAt"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "A paginated list of orders.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/PaginatedOrderResponse"
                },
                "example": {
                  "data": [
                    {
                      "id": "ord_d5f9e3c1-8a7b-4d2e-9f1c-0a9b8d7e6f5a",
                      "orderNumber": "WEB-1001",
                      "channel": "Website",
                      "status": "processing",
                      "createdAt": "2023-11-01T10:30:00Z",
                      "updatedAt": "2023-11-01T11:05:00Z",
                      "customerInfo": {
                        "customerId": "cust_abc987",
                        "email": "john.doe@example.com",
                        "firstName": "John",
                        "lastName": "Doe"
                      },
                      "grandTotal": {
                        "amount": 54.97,
                        "currencyCode": "USD"
                      },
                      "paymentStatus": "paid",
                      "fulfillmentStatus": "unfulfilled",
                      "_links": {
                        "self": {
                          "href": "/orders/ord_d5f9e3c1-8a7b-4d2e-9f1c-0a9b8d7e6f5a"
                        }
                      }
                    }
                  ],
                  "links": {
                    "self": {
                      "href": "/orders?page=1&limit=20"
                    },
                    "next": {
                      "href": "/orders?page=2&limit=20"
                    },
                    "first": {
                      "href": "/orders?page=1&limit=20"
                    },
                    "last": {
                      "href": "/orders?page=15&limit=20"
                    }
                  },
                  "meta": {
                    "totalItems": 295,
                    "itemsPerPage": 20,
                    "currentPage": 1,
                    "totalPages": 15
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/BadRequest"
          },
          "500": {
            "$ref": "#/components/responses/InternalServerError"
          }
        },
        "x-kong-name": "list-orders"
      },
